name: Deploy Angular Frontend to GitHub Pages

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '14.x' # Tailored validation platform matching Angular 12 dependencies

      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Angular Application for Production
        run: |
          cd frontend
          # base-href must match your GitHub repository name exactly: /YOUR_REPO_NAME/
          npx ng build --configuration production --base-href=/YOUR_REPO_NAME/

      - name: Deploy Compiled Files to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist/frontend # The output directory specified in your angular.json
          branch: gh-pages # The target branch GitHub uses to host static sites
